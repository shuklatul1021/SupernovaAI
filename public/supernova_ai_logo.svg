<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Black rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="80" fill="#0D0D1A"/>

  <!-- Main upward triangle -->
  <polygon points="256,80 420,360 92,360" fill="none" stroke="#FFFFFF" stroke-width="10"/>

  <!-- Inner inverted triangle fill -->
  <polygon points="256,160 368,340 144,340" fill="#FFFFFF" opacity="0.1"/>

  <!-- Inner inverted triangle outline -->
  <polygon points="256,178 352,332 160,332" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.6"/>

  <!-- Center solid small triangle -->
  <polygon points="256,248 296,316 216,316" fill="#FFFFFF"/>

  <!-- Midpoint dots on inner triangle edges -->
  <circle cx="304" cy="262" r="7" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="208" cy="262" r="7" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="256" cy="332" r="7" fill="#FFFFFF" opacity="0.6"/>

  <!-- Vertex dots -->
  <circle cx="256" cy="80"  r="10" fill="#FFFFFF"/>
  <circle cx="92"  cy="360" r="10" fill="#FFFFFF"/>
  <circle cx="420" cy="360" r="10" fill="#FFFFFF"/>

</svg>
